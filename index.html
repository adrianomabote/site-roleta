  <script type="module" crossorigin="" src="js/index-BJXQyBA2.js"></script>
  <link rel="stylesheet" crossorigin="" href="css/index-D1hpTV2m.css">

  <!-- Anti-Clone Protection Styles -->
  <style>
    /* Disable text selection */
    * {
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      -webkit-touch-callout: none !important;
    }

    /* Disable image dragging */
    img,
    video {
      -webkit-user-drag: none !important;
      -khtml-user-drag: none !important;
      -moz-user-drag: none !important;
      -o-user-drag: none !important;
      user-drag: none !important;
      pointer-events: none !important;
    }

    /* Allow clicks on buttons only */
    a,
    button {
      pointer-events: auto !important;
    }
  </style>
</head>

<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
  <div id="root"></div>

  <script>
    // ==================== ANTI-CLONE PROTECTION ====================

    // 1. Disable Right Click
    document.addEventListener('contextmenu', e => e.preventDefault());

    // 2. Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S
    document.addEventListener('keydown', e => {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) ||
        (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) ||
        (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) ||
        (e.ctrlKey && (e.key === 'U' || e.key === 'u')) ||
        (e.ctrlKey && (e.key === 'S' || e.key === 's')) ||
        (e.ctrlKey && (e.key === 'P' || e.key === 'p'))
      ) {
        e.preventDefault();
        return false;
      }
    });

    // 3. Disable DevTools detection
    (function () {
      const devtools = { open: false };
      const threshold = 160;

      setInterval(() => {
        if (window.outerWidth - window.innerWidth > threshold ||
          window.outerHeight - window.innerHeight > threshold) {
          if (!devtools.open) {
            devtools.open = true;
            // Redirect or blur page when devtools opens
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:#fff;font-size:24px;">Acesso bloqueado</div>';
          }
        } else {
          devtools.open = false;
        }
      }, 500);
    })();

    // 4. Disable text selection via JS
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());

    // 5. Disable drag
    document.addEventListener('dragstart', e => e.preventDefault());

    // ==================== FIX CONTENT ====================

    document.addEventListener('DOMContentLoaded', () => {
      const fixContent = () => {
        // 1. Fix Affiliate Links
        const buttons = document.querySelectorAll('a');

        if (buttons.length > 0) {
          buttons[0].href = "https://txunaplay.com/tede4f41e";
          buttons[0].target = "_blank";
        }

        if (buttons.length > 1) {
          buttons[1].href = "https://txunaplay.com/tede4f41e";
          buttons[1].target = "_blank";
        }

        // 2. Fix Hero Image if broken
        const images = document.querySelectorAll('img');
        images.forEach(img => {
          if (img.src.includes('aviator-hero')) {
            if (img.naturalWidth === 0) {
              img.src = "./assets/aviator-hero-MIu8xM04.png";
            }
          }
        });

        // 3. Add extra protection to videos
        const videos = document.querySelectorAll('video');
        videos.forEach(video => {
          video.setAttribute('controlsList', 'nodownload noplaybackrate');
          video.setAttribute('disablePictureInPicture', 'true');
          video.removeAttribute('controls');
        });
      };

      fixContent();
      setInterval(fixContent, 500);
    });
  </script>
</body>

</html>
